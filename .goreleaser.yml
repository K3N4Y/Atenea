version: 2

project_name: atenea

builds:
  - id: atenea
    main: ./cmd/atenea
    binary: atenea
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -tags=production
    ldflags:
      - -s -w
      - -X main.version={{ .Tag }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.buildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: atenea
    ids:
      - atenea
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: K3N4Y
    name: Atenea
